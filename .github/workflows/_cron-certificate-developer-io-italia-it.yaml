name: developer.io.italia.it TLS Certificate

on:
  pull_request: # inserted to register workflow
  schedule:
    - cron: "0 2 * * 1,3"
  workflow_dispatch:
    inputs:
      force_renewal:
        description: "Force the certificate renewal to use when cron-triggered execution fails"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write

jobs:
  prod:
    runs-on: ubuntu-latest
    environment: prod-cd
    steps:
      - name: developer.io.italia.it
        uses: pagopa/dx/.github/actions/renew-tls-certificate/action.yaml@main
        with:
          force_renewal: ${{ inputs.force_renewal || false }}
          key_vault_name: "io-p-kv-common"
          csr_common_name: "developer.io.italia.it"
          dns_zone: "io.italia.it"
          dns_zone_resource_group: "io-p-rg-external"